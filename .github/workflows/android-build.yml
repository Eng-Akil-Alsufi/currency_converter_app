name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Fix Project Configuration
        run: |
          # Enable AndroidX
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          
          # Fix Namespace Conflict in build.gradle
          # This ensures testNamespace is different from namespace
          sed -i '/namespace .com.example.currencyconverter./a \        testNamespace "com.example.currencyconverter.test"' app/build.gradle

      - name: Setup Gradle 7.5
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '7.5'

      - name: Build with Gradle
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: app/build/outputs/apk/debug/*.apk
