name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Fix Project Configuration and Missing Resources
        run: |
          # 1. Enable AndroidX
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          
          # 2. Fix Namespace and Missing Icon references in AndroidManifest
          # We will use the default android icon if the custom ones are missing
          sed -i 's/android:icon="@mipmap\/ic_launcher"/android:icon="@android:drawable\/ic_menu_gallery"/g' app/src/main/AndroidManifest.xml
          sed -i 's/android:roundIcon="@mipmap\/ic_launcher_round"//g' app/src/main/AndroidManifest.xml
          
          # 3. Ensure Namespace is set correctly in build.gradle
          # Remove package from Manifest to avoid conflict if necessary, but AGP 7.3.1 prefers it in build.gradle
          sed -i '/namespace .com.example.currencyconverter./a \        testNamespace "com.example.currencyconverter.test"' app/build.gradle

      - name: Setup Gradle 7.5
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '7.5'

      - name: Build with Gradle
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: app/build/outputs/apk/debug/*.apk
