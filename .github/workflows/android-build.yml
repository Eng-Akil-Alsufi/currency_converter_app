name: Build Android APK (Pro)

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Fix Project Configuration and Resources
        run: |
          # 1. Enable AndroidX and Jetifier
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          
          # 2. Fix Namespace and Missing Icon references in AndroidManifest
          # Use a standard Android drawable to avoid build failure due to missing mipmap
          sed -i 's/android:icon="@mipmap\/ic_launcher"/android:icon="@android:drawable\/sym_def_app_icon"/g' app/src/main/AndroidManifest.xml
          sed -i 's/android:roundIcon="@mipmap\/ic_launcher_round"//g' app/src/main/AndroidManifest.xml
          
          # 3. Fix Namespace Conflict in build.gradle
          # Ensure testNamespace is different from namespace
          sed -i '/namespace .com.example.currencyconverter./a \        testNamespace "com.example.currencyconverter.test"' app/build.gradle
          
          # 4. Add ABI support for Emulators (Appetize.io)
          # This ensures the APK contains code for x86_64 and armeabi-v7a/arm64-v8a
          sed -i '/defaultConfig {/a \        ndk { abiFilters "armeabi-v7a", "arm64-v8a", "x86", "x86_64" }' app/build.gradle

      - name: Setup Gradle 7.5
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '7.5'

      - name: Build Debug APK
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: app/build/outputs/apk/debug/*.apk
