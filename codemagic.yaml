workflows:
  android-workflow:
    name: Android Java Currency Converter Workflow
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      groups:
        - google_play
      vars:
        PACKAGE_NAME: "com.example.currencyconverter"
      node: latest
      java: 17

    triggering:
      events:
        - push
        - tag
        - pull_request
      branch_patterns:
        - pattern: 'main'
          include: true
          source: true

    scripts:
      - name: Set up local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Build Android APK
        script: |
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace --info
          
          echo "========== APK FILES =========="
          find . -name "*.apk"

    artifacts:
      - "**/*.apk"
      - app/build/outputs/**/*.apk
      - android/app/build/outputs/**/*.apk

    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true
